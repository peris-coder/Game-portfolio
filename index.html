<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peris Njoroge | Game Developer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="bootstrap/css/bootstrap-grid.min.css">
  <style>
    :root {
      --purple: #8a4fff;
      --dark-bg: #0d0d0d;
    }

    body {
      background-color: var(--dark-bg);
      color: #faf5f5;
      font-family: 'Inter', sans-serif;
      transition: margin-left 0.3s; 
    }

    
    h1, h2, .gradient-text {
      background: linear-gradient(90deg, #8a4fff, #ff4fd8, #4ff0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 300% 300%;
      animation: gradient 6s ease infinite;
      font-family: 'Orbitron', sans-serif;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    
    .hero {
      padding: 20px;
      text-align: center;
      margin-top: 80px;
      transition: all 0.3s;
    }

    @media (max-width: 992px) {
      .hero {
        margin-top: 60px;
        padding: 15px;
      }
    }

    
    .profile-img {
      width: clamp(120px, 25vw, 180px);
      height: clamp(120px, 25vw, 180px);
      border-radius: 50%;
      margin: 20px auto;
      border: 3px solid var(--purple);
    }

    
    .offcanvas {
      background-color: rgba(10, 5, 20, 0.98) !important;
      width: 300px !important; 
    }

    .offcanvas-header {
      border-bottom: 1px solid rgba(138, 79, 255, 0.3);
      padding: 20px;
    }

    .offcanvas-title {
      color: var(--purple);
      font-family: 'Orbitron', sans-serif;
    }

    .offcanvas-body {
      padding: 20px;
    }

    .nav-link {
      color: #eee !important;
      font-size: 1.1rem;
      padding: 12px 20px !important;
      margin: 8px 0;
      border-radius: 5px;
      transition: all 0.3s;
    }

    .nav-link:hover {
      background: rgba(138, 79, 255, 0.2);
    }

    
    body.offcanvas-open {
      margin-left: 300px;
      overflow-x: hidden;
    }

    
    @media (max-width: 576px) {
      .offcanvas {
        width: 75% !important;
      }
      body.offcanvas-open {
        margin-left: 75%;
      }
      .hero h1 {
        font-size: 2rem !important;
      }
    }
  </style>
</head>
<body>
  
  <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
    <div class="container">
      <a class="navbar-brand gradient-text" href="#">Peris Njoroge</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasNavbarLabel">MENU</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
          <div class="offcanvas-body">
          <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About Me</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="project.html">Projects</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  
  <section class="hero">
    <div class="container">
      <h1 class="gradient-text">Peris Njoroge</h1>
      <h3 class="gradient-text">Game Developer</h3>
      <p>Creating immersive worlds & unforgettable gameplay experiences.</p>
      <img src="Bunny.jpg" alt="Peris Profile" class="profile-img">
      <br>
      <a href="project.html" class="btn btn-primary btn-custom mt-3">View Projects</a>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    
    document.getElementById('offcanvasNavbar').addEventListener('show.bs.offcanvas', function () {
      document.body.classList.add('offcanvas-open');
    });
    document.getElementById('offcanvasNavbar').addEventListener('hide.bs.offcanvas', function () {
      document.body.classList.remove('offcanvas-open');
    });
  </script>
</body>
</html>
