<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Peris Njoroge - Game Developer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --purple: #8a4fff;
      --dark-bg: #0d0d0d;
    }

    body {
      background-color: var(--dark-bg);
      color: #faf5f5;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    
    h1, h2, .gradient-text {
      background: linear-gradient(90deg, #8a4fff, #ff4fd8, #4ff0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 300% 300%;
      animation: gradient 6s ease infinite;
      font-family: 'Orbitron', sans-serif;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    
    .content-wrapper {
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(5px);
      min-height: 100vh;
    }

    
    .contact-section {
      padding: 100px 0;
    }

    .contact-card {
      background: rgba(20, 20, 30, 0.7);
      border-radius: 15px;
      border: 1px solid rgba(138, 79, 255, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s;
      padding: 40px;
    }

    .contact-card:hover {
      transform: translateY(-5px);
      border-color: var(--purple);
    }

    
    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 12px 15px;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--purple);
      box-shadow: 0 0 0 0.25rem rgba(138, 79, 255, 0.25);
      color: white;
    }

    .form-label {
      color: #ccc;
    }

    
    .btn-submit {
      background: linear-gradient(45deg, #8a4fff, #6a32d2);
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(138, 79, 255, 0.5);
    }

    
    .info-card {
      background: rgba(30, 30, 40, 0.6);
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 20px;
      border-left: 4px solid var(--purple);
      transition: all 0.3s;
    }

    .info-card:hover {
      transform: translateX(5px);
      background: rgba(30, 30, 40, 0.8);
    }

    .info-icon {
      font-size: 1.5rem;
      color: var(--purple);
      margin-bottom: 15px;
    }

    
    @media (max-width: 768px) {
      .contact-section {
        padding: 60px 0;
      }
      .contact-card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  
  <div id="particles-js"></div>
  
  <div class="content-wrapper">
    
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
      <div class="container">
        <a class="navbar-brand gradient-text" href="index.html">Peris Njoroge</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title gradient-text">MENU</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
          </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Me</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="project.html">Projects</a></li>
                </ul>
            </div>
        </div>
      </div>
    </nav>

    
    <section class="contact-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 text-center mb-5">
            <h1 class="gradient-text mb-3">Let's Collaborate</h1>
            <p class="lead">Have a project in mind? Reach out and let's create something amazing together!</p>
          </div>
        </div>
        
        <div class="row">
          
          <div class="col-lg-7 mb-5 mb-lg-0">
            <div class="contact-card">
              <form id="contactForm">
                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label for="name" class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="name" required>
                  </div>
                  <div class="col-md-6 mb-4">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required>
                  </div>
                </div>
                <div class="mb-4">
                  <label for="subject" class="form-label">Subject</label>
                  <input type="text" class="form-control" id="subject" required>
                </div>
                <div class="mb-4">
                  <label for="message" class="form-label">Message</label>
                  <textarea class="form-control" id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-submit">Send Message <i class="fas fa-paper-plane ms-2"></i></button>
              </form>
            </div>
          </div>
          
          
          <div class="col-lg-5">
            <div class="info-card">
              <div class="info-icon">
                <i class="fas fa-envelope"></i>
              </div>
              <h4>Email Me</h4>
              <p>perisnjoroge64@gmail.com</p>
              <a href="mailto:peris@example.com" class="text-purple">Click to send</a>
            </div>
            
            <div class="info-card">
              <div class="info-icon">
                <i class="fas fa-phone-alt"></i>
              </div>
              <h4>Call/Text</h4>
              <p>+254 123456789</p>
              <a href="tel:+2547123456789" class="text-purple">Click to call</a>
            </div>
            
            <div class="info-card">
              <div class="info-icon">
                <i class="fas fa-map-marker-alt"></i>
              </div>
              <h4>Location</h4>
              <p>Nairobi, Kenya</p>
              <a href="https://maps.google.com/?q=Nairobi" target="_blank" class="text-purple">View on map</a>
            </div>
            
            <div class="d-flex justify-content-center gap-3 mt-4">
              <a href="#" class="btn btn-outline-light btn-social">
                <i class="fab fa-twitter"></i>
              </a>
              <a href="#" class="btn btn-outline-light btn-social">
                <i class="fab fa-github"></i>
              </a>
              <a href="#" class="btn btn-outline-light btn-social">
                <i class="fab fa-linkedin-in"></i>
              </a>
              <a href="#" class="btn btn-outline-light btn-social">
                <i class="fab fa-discord"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    
    particlesJS('particles-js', {
      particles: {
        number: { value: 50 },
        color: { value: "#8a4fff" },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: { 
          enable: true, 
          distance: 150,
          color: "#8a4fff",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 1,
          direction: "none",
          random: true,
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "grab" },
          onclick: { enable: true, mode: "push" }
        }
      }
    });

    
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();

      alert('Message sent! I\'ll get back to you soon.');
      this.reset();
    });
  </script>
</body>
</html>
